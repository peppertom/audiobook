services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
    environment:
      - AUDIOBOOK_REDIS_URL=redis://redis:6379
      - AUDIOBOOK_DATABASE_URL=postgresql+asyncpg://audiobook:audiobook_dev@postgres:5432/audiobook
      - AUDIOBOOK_STORAGE_PATH=/app/storage
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: audiobook
      POSTGRES_PASSWORD: audiobook_dev
      POSTGRES_DB: audiobook
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

# Worker runs NATIVELY on Mac for MPS GPU access:
# cd backend && source .venv/bin/activate && arq app.worker.WorkerSettings
